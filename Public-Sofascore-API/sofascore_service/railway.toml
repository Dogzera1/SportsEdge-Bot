# Railway deployment config for Public-Sofascore-API
#
# Como usar:
# 1. Crie um NOVO service no mesmo projeto Railway (separado do bot principal)
# 2. Connect ao mesmo repo git (ou subdiretório se estiver como submodule)
# 3. Em Settings → Root Directory, defina: Public-Sofascore-API/sofascore_service
# 4. Railway detectará este railway.toml automaticamente
# 5. Defina as env vars mínimas abaixo
# 6. Deploy. Após primeiro boot, copie o domínio gerado (https://xxx.up.railway.app)
#    e configure no bot principal: SOFASCORE_PROXY_BASE=https://xxx.up.railway.app/api/v1/sofascore

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.railway"

[deploy]
# Railway injeta $PORT automaticamente
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Env vars necessárias (configurar no painel Railway → Variables):
#
# SECRET_KEY=<gere com `python -c "import secrets; print(secrets.token_urlsafe(50))"`>
#
# Opcional (só configure se quiser override):
# ALLOWED_HOSTS=seu-dominio.up.railway.app,outro.com
# CORS_ALLOWED_ORIGINS=https://seubot.up.railway.app
# CORS_ALLOW_ALL_ORIGINS=false    # default true — restrinja se quiser
# DATABASE_URL=<só se quiser Postgres real; default é SQLite local>
