[build]
# 2026-05-09: trocado nixpacks → railpack (user request).
# Railpack auto-detecta Node via engines.node em package.json (>=18.0.0)
# e instala native deps (better-sqlite3 precisa gcc+python — Railpack
# default mise traz). Fallback nixpacks.toml mantido pra rollback se necessário.
builder = "railpack"

[deploy]
startCommand = "node start.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[[deploy.healthchecks]]
type = "http"
path = "/health"
initialDelaySeconds = 15
# 2026-05-13: timeout 30→60s. /health pode fazer SELECT em tips table (~157MB)
# que ocasionalmente leva 30+s sob WAL contention. Default 30s causava 3
# consecutive fails → container restart loop (~43/24h observado).
timeoutSeconds = 60
